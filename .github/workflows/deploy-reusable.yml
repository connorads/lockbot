name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      stage:
        description: Serverless stage to deploy
        required: true
        type: string
      environment:
        description: GitHub environment gating the deploy
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to ${{ inputs.stage }}
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Serverless Deploy
        run: pnpm run deploy --region eu-west-1 --stage ${{ inputs.stage }}
        env:
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          STATE_SECRET: ${{ secrets.STATE_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
